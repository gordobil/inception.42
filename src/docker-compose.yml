
name: inception

services:
  nginx:
    container_name: nginx-cont
    build: ./requirements/nginx/.
    restart: unless-stopped
    depends_on: 
      - wordpress
    networks:
      - "inception"
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/html

  wordpress:
    container_name: wordpress-cont
    build: ./requirements/wordpress/.
    restart: unless-stopped
    depends_on: 
      - mariadb
    networks:
      - "inception"
    expose:
      - "9000"
    volumes:
      - wordpress_data:/var/www/html
    env_file:
      - .env

  mariadb:
    container_name: mariadb-cont
    build: ./requirements/mariadb/.
    restart: unless-stopped
    networks:
      - "inception"
    expose:
      - "3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./home/ngordobi/data/wordpress
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./home/ngordobi/data/mariadb

networks:
  inception:
    driver: bridge
