
sevices:

  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb/
    volumes:
      - db_vol:/var/llib/mysql/
    networks:
      - all
    env_file:
      - .env

  wordpress:
    container_name: wordpress
    build: ./requirements/wordpress/
    volumes:
      - wp_vol:/var/www/inception/
    networks:
      - all
    env_file:
      - .env
    depends_on:
      - mariadb

  nginx:
    container_name: nginx
    build:
      context: ./requirements/nginx/
      args:
        CERT_FOLDER: ${CERT_FOLDER}
        CERTIFICATE: ${CERTIFICATE}
        KEY: ${KEY}
        COUNTRY: ${COUNTRY}
        LOCALITY: ${LOCALITY}
        ORGANIZATION: ${ORGANIZATION}
        UNIT: ${UNIT}
        COMMON_NAME: ${COMMON_NAME}
      ports:
        - '443:443'
      volumes:
        - wp_vol:/var/www/inception/
      networks:
        - all
      env_file:
        - .env
      depends_on:
        - wordpress

volumes:

  db_vol:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ~/data/mariadb
  wp_vol:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ~/data/wordpress

networks:

  all:
    driver: bridge

