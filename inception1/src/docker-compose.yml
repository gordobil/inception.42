
name: inception

services:

  mariadb:
    container_name: mariadb-cont
    build: ./requirements/mariadb/.
    restart: on-failure
    networks:
      - inception
    expose:
      - "3306"
    volumes:
      - mariadb_vol:/var/lib/mysql
    env_file:
      - .env

  wordpress:
    container_name: wordpress-cont
    build: ./requirements/wordpress/.
    restart: on-failure
    depends_on: 
      - mariadb
    networks:
      - inception
    expose:
      - "9000"
    volumes:
      - wordpress_vol:/var/www/html
    env_file:
      - .env

  nginx:
    container_name: nginx-cont
#    restart: on-failure
    build:
      context: ./requirements/nginx/.
      args:
        CERT_FOLDER: ${CERT_FOLDER}
        CERTIFICATE: ${CERTIFICATE}
        KEY: ${KEY}
        COUNTRY: ${COUNTRY}
        STATE: ${STATE}
        LOCALITY: ${LOCALITY}
        ORGANIZATION: ${ORGANIZATION}
        UNIT: ${UNIT}
        COMMON_NAME: ${COMMON_NAME}
    depends_on: 
      - wordpress
    networks:
      - inception
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - wordpress_vol:/var/www/html

volumes:
  wordpress_vol:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/ngordobi/data/wordpress
  mariadb_vol:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/ngordobi/data/mariadb

networks:
  inception:
    driver: bridge

